<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário RDMs v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; font-size: 13px; padding: 16px; }

/* Header */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-title { font-size: 17px; font-weight: 600; }
.cal-nav { display: flex; gap: 6px; }
.cal-nav button { background: #fff; border: 1px solid #d0d0d0; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #333; }
.cal-nav button:hover { background: #f5f5f5; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: #f7f7f7; border-radius: 8px; padding: 10px 12px; border: 2px solid transparent; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.stat-left { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.stat-label { font-size: 11px; color: #666; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stat-value-link { font-size: 20px; font-weight: 600; color: #0052cc; cursor: pointer; text-decoration: none; display: inline-block; }
.stat-value-link:hover { text-decoration: underline; }
.donut-wrap { position: relative; flex-shrink: 0; width: 44px; height: 44px; }
.donut-wrap svg { width: 44px; height: 44px; }
.donut-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #555; }

/* Filters */
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.filter-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.filter-card { background: #f7f7f7; border-radius: 8px; border: 1px solid #e0e0e0; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: border-color .15s; width: 160px; flex-shrink: 0; }
.filter-card.active { border-color: #999; background: #fff; }
.filter-card:hover { border-color: #bbb; }
.filter-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.filter-name { font-size: 11px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.filter-qty { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-top: 2px; }
.filter-donut { position: relative; flex-shrink: 0; width: 40px; height: 40px; }
.filter-donut svg { width: 40px; height: 40px; }
.filter-donut-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #555; }

/* Grid */
.cal-grid { border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #f7f7f7; border-bottom: 1px solid #e0e0e0; }
.cal-weekday { text-align: center; font-size: 11px; font-weight: 600; color: #555; padding: 7px 4px; border-right: 1px solid #e0e0e0; }
.cal-weekday:last-child { border-right: none; }
.cal-weekday.wk-dom { color: #c0392b; }
.cal-weekday.wk-sab { color: #0052cc; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day { min-height: 90px; border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; padding: 5px; background: #fff; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.other-month { background: #fafafa; }
.cal-day.today .day-num-inner { background: #0052cc; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.day-num { font-size: 11px; margin-bottom: 3px; font-weight: 600; display: flex; }
.day-num-inner { color: #555; }
.day-num-inner.dom { color: #c0392b; }
.day-num-inner.sab { color: #0052cc; }
.day-num-inner.feriado { color: #c0392b; }

/* RDM items */
.rdm-list { display: flex; flex-direction: column; gap: 2px; }
.rdm-item { font-size: 10.5px; display: flex; align-items: center; gap: 3px; padding: 1px 3px; border-radius: 3px; color: #1a1a1a; text-decoration: none; line-height: 1.5; }
.rdm-item:hover { background: #f0f0f0; }
.rdm-dot { font-size: 8px; flex-shrink: 0; }
.rdm-key { font-weight: 600; flex-shrink: 0; font-size: 10.5px; }
.more-badge { font-size: 10px; color: #0052cc; padding: 1px 3px; margin-top: 2px; cursor: pointer; font-weight: 600; display: inline-block; border-radius: 3px; }
.more-badge:hover { background: #e8f0fe; }

/* Legend */
.legend-row { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }

/* Search */
.search-wrapper { display: flex; align-items: center; gap: 6px; }
.search-input { width: 90px; padding: 5px 8px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 12px; color: #333; outline: none; }
.search-input:focus { border-color: #0052cc; }
.search-btn { background: transparent; border: none; padding: 5px 8px; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; border-radius: 6px; }
.search-btn:hover { background: #f5f5f5; }

/* Freezing */
.freeze-bar { background: #e8f0fe; border-bottom: 2px solid #0052cc; padding: 2px 5px; font-size: 9px; font-weight: 600; color: #0052cc; white-space: nowrap; overflow: hidden; }

/* Popup */
.popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 16px; }
.popup-overlay.hidden { display: none; }
.popup-card { background: #fff; border: 1px solid #d0d0d0; border-radius: 10px; width: 100%; max-width: 440px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.popup-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
.popup-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.popup-count { font-size: 12px; color: #666; margin-top: 2px; }
.popup-close { background: transparent; border: none; cursor: pointer; color: #666; font-size: 18px; padding: 2px 7px; border-radius: 6px; line-height: 1; }
.popup-close:hover { background: #f0f0f0; color: #1a1a1a; }
.popup-body { overflow-y: auto; padding: 8px 12px; flex: 1; }
.popup-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px; border-radius: 6px; text-decoration: none; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; }
.popup-item:last-child { border-bottom: none; }
.popup-item:hover { background: #f7f7f7; }
.popup-dot { font-size: 12px; margin-top: 1px; flex-shrink: 0; }
.popup-info { flex: 1; min-width: 0; }
.popup-key { font-size: 12px; font-weight: 600; }
.popup-summary { font-size: 11px; color: #555; margin-top: 2px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.popup-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.popup-hora { font-size: 10px; color: #888; }
.popup-status-label { font-size: 10px; color: #555; }
.popup-tipo { font-size: 10px; color: #999; }
.popup-ext { font-size: 13px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
</style>
</head>
<body>

<div id="cal-root"></div>

<div class="popup-overlay hidden" id="popup-overlay">
  <div class="popup-card">
    <div class="popup-header">
      <div>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-count" id="popup-count"></div>
      </div>
      <button class="popup-close" id="popup-close">&#x2715;</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>

const FREEZE_START = '2026-05-21';
const FREEZE_END   = '2026-06-02';

function isFreezing(date) {
  const k = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return k >= FREEZE_START && k <= FREEZE_END;
}

function isFreezingStart(date) {
  const k = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return k === FREEZE_START;
}

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WEEKDAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let currentDate = new Date();
let activeFilter = 'Todos';
let byDate = {};

function isFeriado(date) {
  const mmdd = `${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const yyyymmdd = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return FERIADOS_FIXOS.includes(mmdd) || FERIADOS_SP_FIXOS.includes(mmdd) || FERIADOS_MOVEIS.has(yyyymmdd);
}

function getDayClass(date) {
  const dow = date.getDay();
  if (isFeriado(date)) return 'feriado';
  if (dow === 0) return 'dom';
  if (dow === 6) return 'sab';
  return '';
}

function toLocalDateKey(s) { return s ? s.substring(0, 10) : null; }
function toHora(s) { if (!s) return ''; const m = s.match(/T(\d{2}:\d{2})/); return m ? m[1] : ''; }

function getMonthDays(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const days = [];
  for (let i = 0; i < first.getDay(); i++) days.push({ date: new Date(year, month, -first.getDay() + i + 1), current: false });
  for (let d = 1; d <= last.getDate(); d++) days.push({ date: new Date(year, month, d), current: true });
  const rem = 7 - (days.length % 7);
  if (rem < 7) for (let i = 1; i <= rem; i++) days.push({ date: new Date(year, month + 1, i), current: false });
  return days;
}

function filteredIssues() {
  return activeFilter === 'Todos' ? ISSUES : ISSUES.filter(i => i.tipo === activeFilter);
}

function calcStats(year, month) {
  const base = (activeFilter === 'Todos' ? ISSUES : ISSUES.filter(i => i.tipo === activeFilter)).filter(i => {
    const d = toLocalDateKey(i.start);
    if (!d) return false;
    const [y, m] = d.split('-').map(Number);
    return y === year && m - 1 === month;
  });
  const c = { Prevista: 0, Agendada: 0, Aplicada: 0, Reprovada: 0, Cancelada: 0 };
  for (const i of base) { const l = (STATUS_MAP[i.status]||{label:'Outro'}).label; if (c[l] !== undefined) c[l]++; }
  return { total: base.length, ...c };
}

function openPopup(title, issues) {
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-count').textContent = `${issues.length} RDM${issues.length !== 1 ? 's' : ''}`;
  if (issues.length === 0) {
    document.getElementById('popup-title').textContent = title;
    document.getElementById('popup-count').textContent = '';
    document.getElementById('popup-body').innerHTML = '<div style="padding:20px;text-align:center;color:#888;font-size:13px;">Nenhuma RDM encontrada com esse número.</div>';
    document.getElementById('popup-overlay').classList.remove('hidden');
    return;
  }
  document.getElementById('popup-body').innerHTML = issues.map(i => {
    const s = STATUS_MAP[i.status] || { dot: '⚪', label: 'Outro' };
    const hora = toHora(i.start);
    const dataFmt = i.start ? (() => { const [y,m,d] = i.start.substring(0,10).split('-'); return `${d}/${m}/${y}`; })() : '';
    return `<a class="popup-item" href="https://jiracloudae.atlassian.net/browse/${i.key}" target="_blank">
      <span class="popup-dot">${s.dot}</span>
      <div class="popup-info">
        <div class="popup-key">${i.key}</div>
        <div class="popup-summary" title="${i.summary}">${i.summary}</div>
        <div class="popup-meta">
          ${dataFmt ? `<span class="popup-hora">&#128197; ${dataFmt}</span>` : ''}
          ${hora ? `<span class="popup-hora">&#128336; ${hora}</span>` : ''}
          <span class="popup-status-label">${s.label}</span>
          ${i.tipo ? `<span class="popup-tipo">${i.tipo}</span>` : ''}
        </div>
      </div>
      <span class="popup-ext">&#8599;</span>
    </a>`;
  }).join('');
  document.getElementById('popup-overlay').classList.remove('hidden');
}

function closePopup() { document.getElementById('popup-overlay').classList.add('hidden'); }

        const baseTot = ISSUES.filter(i => { const d = toLocalDateKey(i.start); if (!d) return false; const [y2,m2] = d.split('-').map(Number); return y2===year && m2-1===month; }).length;
        const pct = baseTot > 0 ? Math.round((qty / baseTot) * 100) : 0;
        const color = TIPO_COLORS[t] || '#94a3b8';
        const da = dashArray(pct, CIRC40);
        return `<div class="filter-card${activeFilter===t?' active':''}" data-tipo="${t}">
          <div class="filter-info">
            <div class="filter-name">${t}</div>
            <div class="filter-qty">${qty}</div>
          </div>
          <div class="filter-donut">
            <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="none" stroke="#e0e0e0" stroke-width="5"/><circle cx="20" cy="20" r="14" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${da}" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
            <div class="filter-donut-pct">${pct}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        ${WEEKDAYS_PT.map((w, idx) => `<div class="cal-weekday${idx===0?' wk-dom':idx===6?' wk-sab':''}">${w}</div>`).join('')}
      </div>
      <div class="cal-days">
        ${days.map(({ date, current }) => {
          const k = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          const isToday = date.toDateString() === today.toDateString();
          const dayIssues = byDate[k] || [];
          const shown = dayIssues.slice(0, 4);
          const hidden = dayIssues.length - 4;
          const dc = getDayClass(date);
          const freezing = isFreezing(date);
          const freezingStart = isFreezingStart(date);
          return `<div class="cal-day${!current?' other-month':''}${isToday?' today':''}">
            ${freezing ? `<div class="freeze-bar">${freezingStart ? '❄ Início do Freezing' : '❄ Freezing'}</div>` : ''}
            <div class="day-num">
              <span class="day-num-inner${dc?' '+dc:''}">${date.getDate()}</span>
            </div>
            <div class="rdm-list">
              ${shown.map(i => {
                const s = STATUS_MAP[i.status] || { dot: '⚪' };
                const hora = toHora(i.start);
                return `<a class="rdm-item" href="https://jiracloudae.atlassian.net/browse/${i.key}" target="_blank" title="${i.summary}${hora?' · '+hora:''}">
                  <span class="rdm-dot">${s.dot}</span>
                  <span class="rdm-key">${i.key}</span>
                </a>`;
              }).join('')}
              ${hidden > 0 ? `<div class="more-badge" data-date="${k}">+${hidden} mais</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="legend-row">
      <div class="legend-item"><span>🟡</span> Prevista</div>
      <div class="legend-item"><span>🔵</span> Agendada</div>
      <div class="legend-item"><span>🟢</span> Aplicada</div>
      <div class="legend-item"><span>🔴</span> Reprovada</div>

    </div>
  `;

  // Nav
  document.getElementById('btn-prev').onclick = () => { currentDate = new Date(year, month-1, 1); render(); };
  document.getElementById('btn-next').onclick = () => { currentDate = new Date(year, month+1, 1); render(); };
  document.getElementById('btn-today').onclick = () => { currentDate = new Date(); render(); };

  function searchRDM() {
    const input = document.getElementById('search-input');
    const val = input.value.replace(/\D/g, '');
    if (!val) return;
    input.value = '';
    const found = ISSUES.find(i => i.key === 'ITSM-' + val);
    if (found) {
      openPopup('ITSM-' + val, [found]);
    } else {
      openPopup('RDM não encontrada', []);
    }
  }

  document.getElementById('search-btn').onclick = searchRDM;
  document.getElementById('search-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchRDM(); });
  document.getElementById('search-input').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');
  });

  // Filtro tipo
  document.querySelectorAll('.filter-card').forEach(b => {
    b.onclick = () => { activeFilter = b.dataset.tipo; render(); };
  });

  // Cards de stats — só popup, sem filtrar calendário
  document.querySelectorAll('.stat-value-link').forEach(link => {
    link.onclick = () => {
      const key = link.dataset.status;
      const filtered = monthIssues.filter(i => (STATUS_MAP[i.status]||{label:''}).label === key);
      const emoji = statCards.find(c => c.key === key)?.emoji || '';
      openPopup(`${emoji} ${key} — ${MONTHS_PT[month]} ${year}`, filtered);
    };
  });

  // Mais badge
  document.querySelectorAll('.more-badge').forEach(b => {
    b.onclick = () => {
      const dateStr = b.dataset.date;
      const [y, m, d] = dateStr.split('-').map(Number);
      const label = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
      openPopup(label, byDate[dateStr] || []);
    };
  });
}

document.getElementById('popup-close').onclick = closePopup;
document.getElementById('popup-overlay').onclick = (e) => { if (e.target === e.currentTarget) closePopup(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

render();
</script>
</body>
</html>
